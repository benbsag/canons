<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f3ede1" />
    <meta name="color-scheme" content="light" />
    <title>CANONS</title>

    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CANONS" />

    <link
      href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Spectral:ital,wght@0,400;0,500;1,400&family=Space+Grotesk:wght@300;400;500;600;700&family=Comic+Relief:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- ================= HOME ================= -->
      <section id="view-home" class="view">
        <header class="app-header">
          <div class="brand-row">
            <p class="brand">CANONS</p>
            <button class="icon-btn" id="settings-btn" type="button" aria-label="Appearance settings">
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <circle cx="12" cy="12" r="3.2" />
                <path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5 5l2.1 2.1M16.9 16.9 19 19M19 5l-2.1 2.1M7.1 16.9 5 19" />
              </svg>
            </button>
          </div>

          <div class="filter-line">
            <svg class="filter-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="10.5" cy="10.5" r="6.5" fill="none" stroke="currentColor" stroke-width="2" />
              <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            <input
              id="filter-input"
              class="filter-input"
              type="search"
              placeholder=""
              aria-label="Search the cellar"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
            />
          </div>

          <div class="actions">
            <button class="add-btn-large" type="button" id="add-wine-btn">
              <span class="glyph">+</span> add wine
            </button>
          </div>
        </header>

        <main id="wine-list"></main>
      </section>

      <!-- ================= ADD WINE ================= -->
      <section id="view-add" class="view" hidden>
        <header class="view-header">
          <button class="action-link" type="button" id="add-back-btn">‹ back</button>
          <p class="brand">New wine</p>
        </header>

        <form id="add-form" novalidate>
          <div class="wine-fields" id="add-fields"></div>
          <div class="form-actions">
            <button type="submit" class="save-btn">save</button>
          </div>
        </form>
      </section>

      <!-- ================= WINE DETAIL ================= -->
      <section id="view-detail" class="view" hidden>
        <header class="view-header">
          <button class="action-link" type="button" id="detail-back-btn">‹ back</button>
          <button class="action-link action-link--quiet" type="button" id="detail-delete-btn">remove</button>
        </header>

        <p class="meta-line" id="detail-meta"></p>

        <form id="detail-form" novalidate>
          <div class="wine-fields" id="detail-fields"></div>
          <div class="form-actions">
            <span class="save-status" id="detail-save-status"></span>
            <button type="submit" class="save-btn">save</button>
          </div>
        </form>
      </section>

      <!-- ================= SETTINGS ================= -->
      <div class="settings-overlay" id="settings-overlay" hidden>
        <div class="settings-sheet" role="dialog" aria-label="Appearance">
          <div class="settings-head">
            <p class="settings-title">appearance</p>
            <button class="action-link action-link--quiet" type="button" id="settings-close">close</button>
          </div>
          <p class="settings-label">theme</p>
          <div class="theme-list" id="theme-list"></div>

          <p class="settings-label settings-label--spaced">sync</p>

          <!-- Linked state -->
          <div class="sync-linked" id="sync-linked" hidden>
            <p class="sync-info">
              Synced across devices.
              <span class="sync-when" id="sync-when"></span>
            </p>
            <div class="sync-actions">
              <button type="button" class="backup-btn" id="sync-now-btn">sync now</button>
              <button type="button" class="backup-btn" id="sync-copy-btn">copy sync code</button>
              <button type="button" class="backup-btn backup-btn--quiet" id="sync-unlink-btn">unlink</button>
            </div>
          </div>

          <!-- Unlinked state -->
          <div class="sync-setup" id="sync-setup">
            <p class="sync-help">
              Sync your cellar between devices with no account — paste a
              <strong>sync code</strong> from another device, or set up a new
              shared cellar.
            </p>
            <textarea
              class="sync-token-input"
              id="sync-token-input"
              rows="2"
              placeholder="paste a sync code here…"
              autocomplete="off"
              spellcheck="false"
            ></textarea>
            <div class="sync-actions">
              <button type="button" class="backup-btn" id="sync-join-btn">link this device</button>
              <button type="button" class="backup-btn backup-btn--quiet" id="sync-new-btn">set up new cellar</button>
            </div>

            <!-- New-cellar form (Supabase details), revealed by "set up new cellar" -->
            <div class="sync-new-form" id="sync-new-form" hidden>
              <label class="sync-field-label" for="sync-url-input">Supabase project URL</label>
              <input type="url" class="sync-field" id="sync-url-input" placeholder="https://xxxx.supabase.co" autocomplete="off" spellcheck="false" />
              <label class="sync-field-label" for="sync-key-input">Supabase anon key</label>
              <textarea class="sync-field" id="sync-key-input" rows="2" placeholder="eyJ…" autocomplete="off" spellcheck="false"></textarea>
              <label class="sync-field-label" for="sync-code-input">cellar code (the shared secret)</label>
              <div class="sync-code-row">
                <input type="text" class="sync-field" id="sync-code-input" placeholder="e.g. abcd-efgh-ijkl" autocomplete="off" spellcheck="false" />
                <button type="button" class="backup-btn" id="sync-gen-btn">generate</button>
              </div>
              <button type="button" class="backup-btn" id="sync-create-btn">create &amp; link</button>
            </div>
          </div>

          <p class="backup-status" id="sync-status"></p>

          <p class="settings-label settings-label--spaced">backup</p>
          <div class="backup-actions">
            <button type="button" class="backup-btn" id="export-btn">export wines</button>
            <label class="backup-btn" for="import-input">
              import wines
              <input type="file" id="import-input" accept="application/json,.json" hidden />
            </label>
          </div>
          <p class="backup-status" id="backup-status"></p>
        </div>
      </div>
    </div>

    <!-- Shared field markup for Add Wine and Wine detail (cloned via JS) -->
    <template id="wine-fields-template">
      <div class="field field-producer">
        <label data-cf="producer">producer</label>
        <textarea class="f-producer autogrow" rows="1" autocomplete="off" spellcheck="false"></textarea>
      </div>

      <div class="field field-cuvee">
        <label data-cf="cuvee">cuvée</label>
        <textarea class="f-cuvee autogrow" rows="1" autocomplete="off" spellcheck="false"></textarea>
      </div>

      <div class="field">
        <label data-cf="grape_varietals">grape varietals</label>
        <textarea class="f-grapes autogrow" rows="1" placeholder="composition may vary by vintage" autocomplete="off" spellcheck="false"></textarea>
      </div>

      <div class="field-row">
        <div class="field field-vintage">
          <label data-cf="vintage">vintage</label>
          <input type="text" class="f-vintage" placeholder="e.g. 2021 or NV" autocomplete="off" />
        </div>

        <div class="field field-bottles">
          <label>bottles</label>
          <div class="stepper">
            <button type="button" class="stepper-btn bottles-minus" aria-label="One fewer">−</button>
            <input type="number" class="f-bottles" inputmode="numeric" min="0" step="1" value="1" />
            <button type="button" class="stepper-btn bottles-plus" aria-label="One more">+</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label>status</label>
        <div class="status-options">
          <button type="button" class="status-option" data-status="en_cave">en cave</button>
          <button type="button" class="status-option" data-status="envie">envie</button>
          <button type="button" class="status-option" data-status="ausgetrunken">finished</button>
        </div>
      </div>

      <div class="research-launch">
        <button type="button" class="research-trigger">
          <span class="glyph">⌕</span> research this wine
        </button>
        <div class="research-mount"></div>
      </div>

      <p class="section-label">tech facts</p>

      <div class="field-row">
        <div class="field">
          <label data-cf="region">region</label>
          <textarea class="f-region autogrow" rows="1" autocomplete="off" spellcheck="false"></textarea>
        </div>
        <div class="field">
          <label data-cf="country">country</label>
          <textarea class="f-country autogrow" rows="1" autocomplete="off" spellcheck="false"></textarea>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label data-cf="colour">colour</label>
          <textarea class="f-colour autogrow" rows="1" placeholder="rouge / blanc / rosé / orange" autocomplete="off" spellcheck="false"></textarea>
        </div>
        <div class="field">
          <label data-cf="terroir_type">terroir type</label>
          <textarea class="f-terroir autogrow" rows="1" autocomplete="off" spellcheck="false"></textarea>
        </div>
      </div>

      <p class="section-label" data-cf="vinification">vinification</p>
      <div class="field">
        <textarea
          class="f-vinification narrative autogrow"
          rows="3"
          placeholder="concrete facts only — maceration, élevage, vessel, ageing time…"
        ></textarea>
      </div>

      <p class="section-label" data-cf="tasting_notes">tasting notes</p>
      <div class="field">
        <textarea class="f-tasting-notes narrative autogrow" rows="3"></textarea>
      </div>
      <div class="field">
        <label data-cf="drinking_window">drinking window</label>
        <textarea class="f-drinking-window autogrow" rows="1" placeholder="e.g. now–2030" autocomplete="off" spellcheck="false"></textarea>
      </div>

      <p class="section-label" data-cf="expert_context">context</p>
      <div class="field">
        <textarea
          class="f-expert-context narrative autogrow"
          rows="3"
          placeholder="the lowdown — where it sits in the lineup, scarcity, price, who pours it… (research can fill this)"
        ></textarea>
      </div>

      <p class="section-label">notes</p>
      <div class="field">
        <textarea class="f-user-notes narrative autogrow" rows="3" placeholder="your own notes"></textarea>
      </div>

      <div class="provenance-block" hidden>
        <p class="section-label">sources</p>
        <p class="confidence-legend">
          <span class="confidence-dot" data-confidence="sourced"></span> sourced
          <span class="confidence-dot" data-confidence="inferred"></span> inferred
          <span class="confidence-dot" data-confidence="not_found"></span> not found
        </p>
        <ul class="sources-list"></ul>
      </div>
    </template>

    <!-- Research panel (cloned into the Add and Detail views via JS) -->
    <template id="research-panel-template">
      <section class="research-panel" hidden>
        <div class="research-input">
          <p class="research-help">
            Tap <strong>copy request</strong>, paste it into Claude or ChatGPT,
            then paste the reply back below and tap <strong>review</strong>.
          </p>
          <div class="research-actions research-actions--start">
            <button type="button" class="action-link research-copy-btn">
              <span class="glyph">⧉</span> copy request
            </button>
            <span class="research-status research-copy-status"></span>
          </div>
          <textarea
            class="research-paste"
            rows="4"
            placeholder="paste the assistant's reply here…"
            autocomplete="off"
            spellcheck="false"
          ></textarea>
          <p class="research-error" hidden></p>
          <div class="research-actions">
            <button type="button" class="action-link action-link--quiet research-cancel-btn">cancel</button>
            <button type="button" class="save-btn research-review-btn">review</button>
          </div>
        </div>

        <div class="research-review" hidden>
          <p class="research-label">review &amp; apply — unchecked items are left as they are</p>
          <div class="research-preview-list"></div>
          <div class="research-actions">
            <button type="button" class="action-link action-link--quiet research-back-btn">back</button>
            <button type="button" class="save-btn research-apply-btn">apply selected</button>
          </div>
        </div>
      </section>
    </template>

    <script src="./storage.js"></script>
    <script src="./research.js"></script>
    <script src="./sync.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
