<!DOCTYPE html>
<html lang="en" data-theme="paper">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>CANONS</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Spectral:ital,wght@0,400;0,500;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .share-hero {
        margin-bottom: var(--space-5);
        padding-bottom: var(--space-4);
        border-bottom: 1px solid var(--hairline);
      }
      .share-hero .wine-producer { margin: 0 0 4px; }
      .share-hero .wine-cuvee   { margin: 0 0 var(--space-2); }
      .share-sub {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: lowercase;
        color: var(--muted);
        margin: var(--space-2) 0 0;
      }
      .share-value {
        font-family: var(--font-mono);
        font-size: 15px;
        color: var(--ink);
        margin: 2px 0 0;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--hairline);
      }
      .share-narrative {
        font-family: var(--font-serif);
        font-size: 16px;
        line-height: 1.6;
        color: var(--ink);
        margin: 0;
        padding-bottom: var(--space-3);
        white-space: pre-wrap;
      }
      .share-footer {
        margin-top: var(--space-6);
        padding-top: var(--space-3);
        border-top: 1px solid var(--hairline);
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: lowercase;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="app">

      <header class="app-header">
        <div class="brand-row">
          <p class="brand">CANONS</p>
        </div>
      </header>

      <main id="wine-card">
        <p class="empty-state">loading…</p>
      </main>

    </div>

    <script>
      (function () {

        function esc(str) {
          return String(str || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        }

        function inlineField(label, value) {
          if (!value) return "";
          return `<div class="field"><label>${esc(label)}</label><p class="share-value">${esc(value)}</p></div>`;
        }

        function narrativeBlock(label, value) {
          if (!value) return "";
          return `<p class="section-label">${esc(label)}</p><div class="field"><p class="share-narrative">${esc(value)}</p></div>`;
        }

        function render(wine) {
          const tf  = wine.tech_facts   || {};
          const tn  = wine.tasting_notes || {};
          const sub = [tf.colour, tf.region, tf.country].filter(Boolean);
          const card = document.getElementById("wine-card");

          document.title = [wine.producer, wine.cuvee].filter(Boolean).join(" — ") + " — CANONS";

          card.innerHTML = `
            <div class="share-hero">
              <p class="wine-producer">${esc(wine.producer)}</p>
              <p class="wine-cuvee">${esc(wine.cuvee)}</p>
              ${wine.vintage ? `<span class="wine-vintage">${esc(wine.vintage)}</span>` : ""}
              ${sub.length ? `<p class="share-sub">${esc(sub.join(" · "))}</p>` : ""}
            </div>
            ${inlineField("grape varietals", tf.grape_varietals)}
            ${inlineField("terroir", tf.terroir_type)}
            ${narrativeBlock("vinification", wine.vinification)}
            ${narrativeBlock("tasting notes", tn.notes)}
            ${inlineField("drinking window", tn.drinking_window)}
            ${narrativeBlock("context", wine.expert_context)}
            <p class="share-footer">shared via canons</p>
          `;
        }

        function showError(msg) {
          document.getElementById("wine-card").innerHTML =
            `<p class="empty-state">${esc(msg)}</p>`;
        }

        const params  = new URLSearchParams(location.search);
        const id      = params.get("id");
        const sBase   = params.get("s");

        if (!id || !sBase) {
          showError("This link doesn't look right.");
          return;
        }

        const fnUrl = `${sBase}/functions/v1/share-wine?id=${encodeURIComponent(id)}`;

        fetch(fnUrl)
          .then((r) => {
            if (!r.ok) throw new Error(r.status === 404 ? "Wine not found." : `Error ${r.status}.`);
            return r.json();
          })
          .then(({ data }) => {
            if (!data) throw new Error("Empty response.");
            render(data);
          })
          .catch((err) => showError(err.message || "Couldn't load this wine."));

      })();
    </script>
  </body>
</html>
